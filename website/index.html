<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panda CRM — Download</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo-wrap svg {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      filter: drop-shadow(0 8px 32px rgba(213, 148, 220, 0.35));
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.8px;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 14px;
      color: #666;
      margin-bottom: 36px;
    }

    /* Download buttons */
    .downloads {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: opacity .15s, transform .1s;
      border: 1px solid #1e1e1e;
      background: #111;
      color: #f0f0f0;
      cursor: pointer;
    }
    .btn:hover { background: #161616; border-color: #2a2a2a; }
    .btn:active { transform: scale(.98); }
    .btn-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-icon.mac  { background: #1c1c1e; }
    .btn-icon.win  { background: #1c1c1e; }
    .btn-text { text-align: left; }
    .btn-text strong { display: block; font-weight: 600; font-size: 14px; }
    .btn-text span   { font-size: 11px; color: #666; }
    .btn-arrow { color: #444; font-size: 16px; }

    /* Version tag */
    .version {
      font-size: 11px;
      color: #444;
      margin-bottom: 8px;
    }

    /* Footer */
    .footer {
      font-size: 11px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Logo -->

            <stop offset="55%" stop-color="#D294DC"/>
            <stop offset="100%" stop-color="#B568E5"/>

        </defs>
        <rect x="0" y="0" width="320" height="320" rx="72" fill="url(#pinkPurple)"/>
        <circle cx="82" cy="98" r="38" fill="#1A1A1A"/>
        <circle cx="238" cy="98" r="38" fill="#1A1A1A"/>
        <circle cx="82" cy="103" r="16" fill="#F5B8CC"/>
        <circle cx="238" cy="103" r="16" fill="#F5B8CC"/>
        <circle cx="160" cy="172" r="108" fill="#FAFAFA"/>

        <ellipse cx="197" cy="158" rx="24" ry="32" fill="#1A1A1A" transform="rotate(-20 197 158)"/>
        <circle cx="128" cy="157" r="8.5" fill="#FAFAFA"/>
        <circle cx="192" cy="157" r="8.5" fill="#FAFAFA"/>
        <circle cx="129" cy="158" r="5" fill="#1A1A1A"/>
        <circle cx="191" cy="158" r="5" fill="#1A1A1A"/>
        <circle cx="130.5" cy="156" r="1.8" fill="#FAFAFA"/>
        <circle cx="192.5" cy="156" r="1.8" fill="#FAFAFA"/>
        <ellipse cx="160" cy="202" rx="11" ry="7.5" fill="#1A1A1A"/>
        <path d="M160 210 Q160 221 150 222" stroke="#1A1A1A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
        <path d="M160 210 Q160 221 170 222" stroke="#1A1A1A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Panda CRM</h1>
    <p class="tagline">Download the desktop app to get started</p>

    <div class="downloads">

            </svg>

          <div class="btn-text">

      <!-- Intel Mac — replace DOWNLOAD_URL_X64 -->

          <div class="btn-icon mac">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#f0f0f0">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>

          <div class="btn-text">

            <span>Intel Core · context-it-1.0.0.dmg</span>

    </div>

    <p class="version" id="version-tag">v1.0.0 · Early access</p>
    <p class="footer">Install, open, and log in. Backend is pre-configured.</p>

  </div>
</body>
</html>
