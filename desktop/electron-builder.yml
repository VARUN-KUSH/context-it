appId: com.context-it.desktop
productName: context-it
copyright: Copyright © 2024

directories:
  output: release
  buildResources: assets

files:
  - dist-electron/**/*
  - package.json

# Pull the already-built frontend into the app bundle under Resources/frontend-dist
extraResources:
  - from: ../frontend/dist
    to: frontend-dist

mac:
  category: public.app-category.business
  icon: assets/icon.png
  target:
    - target: dmg
      arch:
        - arm64
        - x64

dmg:
  title: context-it

win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.png
  uninstallerIcon: assets/icon.png
